<body>

   <!-- CUTSCENE OVERLAY -->
   <div id="cutscene" style="position:fixed;top:0;left:0;width:100vw;height:100vh;background:#000;color:#fff;display:flex;align-items:center;justify-content:center;z-index:99;font-family:'Press Start 2P',monospace;font-size:2vw;letter-spacing:2px;display:none;">
     <span>You suddenly encounter the wisdom of fire</br></br> *click anywhere to continue*</span>
   </div>

   <!-- CONFIRMATION MODAL -->
   <div id="confirmModal" class="settings-modal hidden">
     <div class="settings-content">
       <p>Do you want to go back to main menu?</p>
       <button id="confirmYes" style="background-color: #ff6b6b; color: white; margin: 10px;">Yes</button>
       <button id="confirmNo" style="background-color: #51cf66; color: white; margin: 10px;">No</button>
     </div>
   </div>

   <!-- AUDIO ELEMENTS -->
   <audio id="firstRoundCutscene" src="audios/FirstRound.mp3"></audio>
   <audio id="firstRoundBg" src="audios/FirstRoundsLoopBg.mp3" loop></audio>

   <div class="game">
     <div id="effectOverlay" class="effect-overlay"></div>
     <div class="battlefield">
       <div class="pause-music-group">
         <button class="pm-btn" id="settingsBtn">Main Menu</button>
       </div>
       <div class="player-hp-bar">
         YOU HP:
         <div id="playerHP" class="hp-fill" style="width:100%"></div>
       </div>
       <div class="enemy-hp-bar">
         DISASTER HP:
         <div id="enemyHP" class="hp-fill" style="width:100%"></div>
       </div>
       <div class="timer" id="timer">Time Left: 35s</div>

       <!-- Earthquake Enemy -->
       <div id="enemy-animation" class="sprite enemy-animation" style="height:auto;">
         <div class="sprite-inner">
           <img class="enemy-frame" src="3fEnemy/fire1.png" style="display: none;" />
           <img class="enemy-frame" src="3fEnemy/fire2.png" style="display: none;" />
           <img class="enemy-frame defeated" src="ED/pixil-frame-0.png" style="display: none;" />
           <img class="enemy-frame defeated" src="ED/pixil-frame-1.png" style="display: none;" />
         </div>
       </div>
     </div>
   </div>

   <!-- Fixed message and choices boxes -->
   <div class="message-box-fixed">
     <div class="message" id="messageBox">
       <span id="text-content"></span><span id="cursor">|</span>
     </div>
   </div>
   <div class="choices-box-fixed">
     <div class="choices hidden" id="choicesArea"></div>
   </div>



<script>
// Fire Level 3 Logic - Quiz Style (No Character Movement)
let playerHP = 100;
let enemyHP = 100;
let currentScenario = 0;
let currentScenarioType = "fire";
let timeLeft = 35;
let timerInterval = null;
let typingInterval = null;
let choiceLock = false;
let paused = false;
let musicOn = true;
let timerPausedForChoice = false;
let playerBarFaded = false;
let enemyBarFaded = false;
let gameWon = false;

// --- FIRE SCENARIOS ---
const scenariosRound1 = [
    {
        situation: "You open the classroom door and the hallway is filled with thick, gray smoke.",
        bg: "url('images/round2.png')",
        good: ["Crawl low"],
        choices: [
            { text: "Crawl low" },
            { text: "do nothing" },
            { text: "go back inside" }
        ]
    },
    {
        situation: "The alarm is screaming, and your teacher is ushering everyone out. You realize your backpack (with your phone and laptop) is still at your desk.",
        bg: "url('images/round2.png')",
        good: ["Leave it"],
        choices: [
            { text: "Leave it" },
            { text: "ignore the warnings" },
            { text: "go back inside" }
        ]
    },
    {
        situation: "You’re on the third floor when the alarm goes off. The elevator is right there and empty.",
        bg: "url('images/round2.png')",
        good: ["take the stairs"],
        choices: [
            { text: "take the stairs" },
            { text: "stay on the third floor" },
            { text: "take the elevator" }
        ]
    }
];


// --- TIMER ---
function startTimer() {
    clearInterval(timerInterval);
    timeLeft = 35;
    document.getElementById('timer').textContent = `Time Left: ${timeLeft}s`;

    timerInterval = setInterval(() => {
        if (paused || timerPausedForChoice) return;
        if (playerHP <= 0 || enemyHP <= 0) {
            clearInterval(timerInterval);
            return;
        }
        timeLeft--;
        document.getElementById('timer').textContent = `Time Left: ${timeLeft}s`;

        if (timeLeft <= 0) {
            console.log('Timer reached 0, setting player HP to 0');
            clearInterval(timerInterval);
            const bgAudio = document.getElementById('firstRoundBg');
            if (bgAudio && !bgAudio.paused) {
                bgAudio.pause();
            }
            playerHP = 0;
            updateHPBars();
            if (!playerBarFaded) {
                playerBarFaded = true;
                const playerBar = document.querySelector('.player-hp-bar');
                playerBar.classList.add('fade-out');
                setTimeout(() => playerBar.style.display = 'none', 750);
            }
            gameWon = false;
            typeText("Time's up! The disaster overwhelms you.", () => {
                console.log('Timer expired, showing death buttons');
                showDeathButtons();
            });
        }
    }, 1000);
}

// --- HP BARS ---
function updateHPBars() {
    const playerHPBar = document.getElementById('playerHP');
    playerHPBar.style.width = Math.max(playerHP, 0) + "%";
    if (playerHP > 50) {
        playerHPBar.style.background = "linear-gradient(90deg, #44ff44 0%, #228822 100%)";
    } else if (playerHP > 25) {
        playerHPBar.style.background = "linear-gradient(90deg, #fff700 0%, #ffae00 100%)";
    } else {
        playerHPBar.style.background = "linear-gradient(90deg, #ff4444 0%, #b80000 100%)";
    }

    const enemyHPBar = document.getElementById('enemyHP');
    enemyHPBar.style.width = Math.max(enemyHP, 0) + "%";
    if (enemyHP > 50) {
        enemyHPBar.style.background = "linear-gradient(90deg, #44ff44 0%, #228822 100%)";
    } else if (enemyHP > 25) {
        enemyHPBar.style.background = "linear-gradient(90deg, #fff700 0%, #ffae00 100%)";
    } else {
        enemyHPBar.style.background = "linear-gradient(90deg, #ff4444 0%, #b80000 100%)";
    }
}

// --- TYPEWRITER ---
function typeText(text, onComplete, initialText = "") {
    clearInterval(typingInterval);
    const contentEl = document.getElementById('text-content');
    contentEl.textContent = initialText;
    let idx = 0;

    typingInterval = setInterval(() => {
        if (paused) return;
        contentEl.textContent += text[idx++];
        if (idx >= text.length) {
            clearInterval(typingInterval);
            onComplete && onComplete();
        }
    }, 30);
}

// --- SHOW SCENARIO ---
function showScenario(i) {
    choiceLock = false;
    const s = scenariosRound1[i];
    document.body.style.backgroundImage = s.bg;

    const disasterName = "Fire: ";
    const choices = document.getElementById('choicesArea');
    choices.classList.add('hidden');
    choices.innerHTML = "";

    typeText(s.situation, () => {
        s.choices.forEach(choice => {
            const btn = document.createElement('button');
            btn.textContent = choice.text;
            btn.onclick = () => {
                if (choiceLock) return;
                choiceLock = true;
                Array.from(choices.children).forEach(b => b.disabled = true);
                pauseTimerForChoice();
                setTimeout(() => makeChoice(s.good.includes(choice.text)), 700);
            };
            choices.appendChild(btn);
        });
        choices.classList.remove('hidden');
    }, disasterName);
}

// --- PAUSE TIMER FOR CHOICE ---
function pauseTimerForChoice() {
    timerPausedForChoice = true;
    setTimeout(() => {
        timerPausedForChoice = false;
    }, 3000);
}

// --- CHOICE LOGIC ---
function makeChoice(isGood) {
    const damage = 50;
    const overlay = document.getElementById('effectOverlay');

    if (isGood) {
        enemyHP -= damage;
        const enemyEl = document.getElementById("enemy-animation");
        enemyEl.classList.add("flash");
        setTimeout(() => enemyEl.classList.remove("flash"), 400);
        overlay.classList.add('success-flash');
        setTimeout(() => overlay.classList.remove('success-flash'), 300);

        typeText("It's effective! Disaster is weakened!", () => {
            setTimeout(() => {
                proceedAfterChoice(isGood);
            }, 1000);
        });
    } else {
        playerHP -= damage;
        document.querySelector(".battlefield").classList.add("shake-medium");
        setTimeout(() => document.querySelector(".battlefield").classList.remove("shake-medium"), 400);
        overlay.classList.add('damage-flash');
        setTimeout(() => overlay.classList.remove('damage-flash'), 500);

        typeText("Bad move! You got hurt!", () => {
            setTimeout(() => {
                proceedAfterChoice(isGood);
            }, 1000);
        });
    }
    updateHPBars();
}

// --- PROCEED AFTER CHOICE ---
function proceedAfterChoice(isGood) {
    const overlay = document.getElementById('effectOverlay');

    // Check defeated animations
    if (playerHP <= 0) {
        overlay.classList.add('damage-flash');
        setTimeout(() => overlay.classList.remove('damage-flash'), 500);
    }
    if (enemyHP <= 0) {
        stopEnemyAnimation();
        showEnemy1DefeatedFrame();
        overlay.classList.add('victory-flash');
        setTimeout(() => overlay.classList.remove('victory-flash'), 800);
    }

    // Trigger fade-out on HP bars if HP reaches zero
    if (playerHP <= 0 && !playerBarFaded) {
        playerBarFaded = true;
        const playerBar = document.querySelector('.player-hp-bar');
        playerBar.classList.add('fade-out');
        setTimeout(() => playerBar.style.display = 'none', 750);
    }
    if (enemyHP <= 0 && !enemyBarFaded) {
        enemyBarFaded = true;
        const enemyBar = document.querySelector('.enemy-hp-bar');
        enemyBar.classList.add('fade-out');
        setTimeout(() => enemyBar.style.display = 'none', 750);
    }

    // Check win/lose
    console.log('Checking HP values - Player:', playerHP, 'Enemy:', enemyHP);

    if (enemyHP <= 0) {
        console.log('Victory condition met!');
        const bgAudio = document.getElementById('firstRoundBg');
        if (bgAudio && !bgAudio.paused) {
            bgAudio.pause();
        }
        gameWon = true;

        typeText("You overcame the fire! Scenario completed!", () => {
            console.log('Victory achieved, showing completion buttons');
            setTimeout(() => {
                showCompletionButtons();
            }, 500);
        });
        return;
    }

    // Check defeat - only when HP actually reaches 0
    if (playerHP <= 0) {
        console.log('Defeat condition met! Player HP:', playerHP);
        const bgAudio = document.getElementById('firstRoundBg');
        if (bgAudio && !bgAudio.paused) {
            bgAudio.pause();
        }
        gameWon = false;
        typeText("You lost!", () => {
            console.log('Player HP reached 0, showing death buttons');
            showDeathButtons();
        });
        return;
    }

    // Advance scenario
    currentScenario++;
    if (currentScenario < scenariosRound1.length) {
        setTimeout(() => showScenario(currentScenario), 800);
    }
}

// Function to mark level 3 as completed and unlock level 4
function markLevelAsCompleted() {
    console.log('markLevelAsCompleted function called');
    if (typeof window.markLevelCompleted === 'function') {
        try {
            window.markLevelCompleted('Fire', 3);
            console.log('Called chapters.html markLevelCompleted successfully');
        } catch (error) {
            console.error('Error calling chapters.html function:', error);
            updateLevelProgressFallback('Fire', 3);
        }
    } else {
        console.log('chapters.html system not available, using fallback');
        updateLevelProgressFallback('Fire', 3);
    }
}

// Fallback function for when chapters.html progression system is not loaded
function updateLevelProgressFallback(track, level) {
    const saved = localStorage.getItem('escape-the-disaster-track-progress');
    let trackStates = {};

    if (saved) {
        trackStates = JSON.parse(saved);
    } else {
        trackStates = {
            Fire: { 1: 'unlocked', 2: 'locked', 3: 'locked', 4: 'locked', 5: 'locked' },
            Earthquake: { isUnlocked: false, levels: { 1: 'locked', 2: 'locked', 3: 'locked', 4: 'locked', 5: 'locked' } }
        };
    }

    if (trackStates[track]) {
        if (trackStates[track].levels) {
            trackStates[track].levels[level] = 'completed';
        } else {
            trackStates[track][level] = 'completed';
        }
    }

    const nextLevel = level + 1;
    if (nextLevel <= 5) {
        if (trackStates[track].levels) {
            trackStates[track].levels[nextLevel] = 'unlocked';
        } else {
            trackStates[track][nextLevel] = 'unlocked';
        }
    }

    if (level >= 4) {
        trackStates.Fire.isUnlocked = true;
        trackStates.Fire.levels[1] = 'unlocked';
    }

    localStorage.setItem('escape-the-disaster-track-progress', JSON.stringify(trackStates));
}

// --- ANIMATION SYSTEM ---
function createAnimation(selector, intervalTime, loop = true, loopLength = null) {
    const frames = document.querySelectorAll(selector);
    let idx = 0;
    const length = loopLength || frames.length;
    const interval = setInterval(() => {
        frames.forEach((img, i) => img.style.display = (i === idx ? 'block' : 'none'));
        if (idx === length - 1 && !loop) {
            clearInterval(interval);
            return;
        }
        idx = (idx + 1) % length;
    }, intervalTime);
    return interval;
}

// FIRE ENEMY ANIMATION
const enemyFrames = document.querySelectorAll('#enemy-animation .enemy-frame:not(.defeated)');
let enemyAnimInterval = createAnimation('#enemy-animation .enemy-frame:not(.defeated)', 400);

// --- DEFEAT ANIMATIONS ---
let enemy1DefeatedAnimInterval = null;

function stopEnemyAnimation() {
    clearInterval(enemyAnimInterval);
}

function showEnemy1DefeatedFrame() {
    clearInterval(enemyAnimInterval);
    document.querySelectorAll('#enemy-animation .enemy-frame:not(.defeated)').forEach(img => img.style.display = 'none');
    enemy1DefeatedAnimInterval = createAnimation('#enemy-animation .enemy-frame.defeated', 400, false);
}

// --- CUTSCENE LOGIC ---
function showCutscene() {
    const cutscene = document.getElementById('cutscene');
    cutscene.style.display = 'flex';
    cutscene.style.opacity = '1';
    cutscene.classList.remove('fade-out');
    cutscene.style.cursor = 'pointer';
    cutscene.tabIndex = 0;
    cutscene.focus();

    const audio1 = document.getElementById('firstRoundCutscene');
    if (audio1) {
        audio1.currentTime = 0;
        audio1.play().catch(e => console.log('Audio play failed:', e));
    }

    function startGameFromCutscene(event) {
        event.preventDefault();
        event.stopPropagation();

        cutscene.classList.add('fade-out');

        setTimeout(() => {
            cutscene.style.display = 'none';
            cutscene.classList.remove('fade-out');

            startTimer();
            showScenario(0);
        }, 750);

        cutscene.removeEventListener('keydown', startGameFromCutscene);
        cutscene.removeEventListener('click', startGameFromCutscene);

        if (audio1) {
            audio1.pause();
        }
        document.getElementById('firstRoundBg').currentTime = 0;
        if (musicOn) document.getElementById('firstRoundBg').play();
    }
    cutscene.addEventListener('keydown', startGameFromCutscene);
    cutscene.addEventListener('click', startGameFromCutscene);
}
